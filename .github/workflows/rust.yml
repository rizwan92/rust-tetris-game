name: Rust

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "starter-reset", "mac-stabilization"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  WGPU_BACKEND: vulkan
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  CARGO_INCREMENTAL: 0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libvulkan-dev \
            mesa-vulkan-drivers

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: linux-ci-shared

      - name: Configure software Vulkan
        run: |
          echo "Available Vulkan ICD files:"
          ls -la /usr/share/vulkan/icd.d

          ICD_FILE="$(find /usr/share/vulkan/icd.d -maxdepth 1 -type f \( -name '*lvp*.json' -o -name '*lavapipe*.json' \) | head -n 1)"

          if [ -z "$ICD_FILE" ]; then
            echo "Could not find a lavapipe Vulkan ICD file." >&2
            exit 1
          fi

          echo "Using Vulkan ICD: $ICD_FILE"
          echo "VK_ICD_FILENAMES=$ICD_FILE" >> "$GITHUB_ENV"
          echo "VK_DRIVER_FILES=$ICD_FILE" >> "$GITHUB_ENV"

      - name: Run fmt check
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --no-default-features --features ci -- -D warnings

      - name: Run tests
        run: cargo nextest run --no-default-features --features ci --verbose --no-fail-fast --retries 2
