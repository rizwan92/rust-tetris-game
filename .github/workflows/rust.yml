name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libvulkan-dev

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run fmt check
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --no-default-features --features ci -- -D warnings

      - name: Run tests
        run: cargo nextest run --no-default-features --features ci --verbose --no-fail-fast --retries 2
